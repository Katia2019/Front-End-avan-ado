<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
        <h1>Formulario Top</h1>
        <fieldset>
            <legend>Digite aqui!</legend>
            <form>
                <label>Digite seu email:</label>
                <input type="email" placeholder="exemplo@email.com">
                <br>
                <label>Digite seu nome:</label>
                <input type="text" placeholder="Exemplo" required>
                <br>
                <label>Digite sua idade:</label>
                <input type="number">
                <br>
                <label>Digite a data da consulta:</label>
                <input type="date">
                <br>
                <label>Marque seu tipo de consulta:</label>
                <br>
                Colonoscopia
                <input type="checkbox">
                <br>
                Raio x 
                <input type="checkbox">
                <br>
                Coração
                <input type="checkbox">
                <br>
                Hemograma
                <input type="checkbox">
                <br>
                <label>Qual seu Estado</label>
                <select>
                    <option>MG</option>
                    <option>SP</option>
                    <option>RJ</option>
                </select>
                <br>

                <label>Qual sua identidade de genêro?</label>
                <br>
                <input type="radio" name="sexo">
                Masculino
                <input type="radio" name="sexo">
                Feminino
                <input type="radio" name="sexo">
                Outros
                <br>
                <label>CPF:</label>
                <input type="password">
                <br>
                <label>Qual seu nivel de dor:</label>
                <input type="range" min="0" max="10">
                <input type="reset">

                <button type="submit">Clique para enviar</button>
            </form>
        </fieldset>
    </main>
</body>
</html>
