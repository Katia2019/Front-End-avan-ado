<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>

                <br>

                <input type="text">

                <label>Aceitar os Termos:</label>
                <br>
                <label>Sim</label> 
                <input type="radio" name="escolha">

                <input type="radio" name="escolha"> 
                <br>             
                <input type="reset">

            </form>
        </fieldset>
    </main>
</body>
</html>
